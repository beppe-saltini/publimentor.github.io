name: Supabase keep-alive

# Prevents Supabase free-tier auto-pause after 7 days of inactivity.
# Scheduled workflows run from the default branch (main).
on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Read beta_codes via Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_KEY repository secrets."
            exit 1
          fi
          code=$(curl -s -o /tmp/keepalive-body.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/beta_codes?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          echo "Keep-alive ping at $(date -u +%Y-%m-%dT%H:%M:%SZ) -> HTTP ${code}"
          if [ "$code" != "200" ]; then
            echo "Response body:"
            cat /tmp/keepalive-body.txt
            exit 1
          fi
          echo "Supabase database activity recorded successfully."
