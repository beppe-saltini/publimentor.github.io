# =============================================================================
# Architecture Review Board (ARB) - Automated Code Analysis
# =============================================================================
# Triggers on every push and pull request to run a comprehensive architecture
# review from 6 IT architect perspectives. Produces a report and remediation plan.
# =============================================================================

name: Architecture Review Board

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - 'reports/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  architecture-review:
    name: Run Architecture Review
    runs-on: ubuntu-latest
    
    steps:
      # ----- Setup -----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff analysis

      - name: Set up review environment
        run: |
          echo "REVIEW_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          echo "REVIEW_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          mkdir -p reports

      # ----- Run Architecture Review -----
      - name: Run Architecture Review Engine
        id: review
        continue-on-error: true  # Don't fail the workflow, capture exit code
        run: |
          chmod +x .github/scripts/architecture-review.sh
          .github/scripts/architecture-review.sh "." 2>&1 | tee /tmp/review-log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Determine review status
        id: status
        run: |
          EXIT_CODE="${{ steps.review.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "2" ]; then
            echo "status=critical" >> $GITHUB_OUTPUT
            echo "badge_color=red" >> $GITHUB_OUTPUT
            echo "status_emoji=🔴" >> $GITHUB_OUTPUT
            echo "status_text=CRITICAL ISSUES FOUND" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" = "1" ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "badge_color=orange" >> $GITHUB_OUTPUT
            echo "status_emoji=🟠" >> $GITHUB_OUTPUT
            echo "status_text=HIGH SEVERITY ISSUES FOUND" >> $GITHUB_OUTPUT
          else
            echo "status=passing" >> $GITHUB_OUTPUT
            echo "badge_color=green" >> $GITHUB_OUTPUT
            echo "status_emoji=✅" >> $GITHUB_OUTPUT
            echo "status_text=ALL CHECKS PASSED" >> $GITHUB_OUTPUT
          fi

      # ----- Upload Report as Artifact -----
      - name: Upload review report artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-review-${{ env.REVIEW_DATE }}
          path: reports/architecture-review-*.md
          retention-days: 90

      # ----- Commit Report to Repository (on push to main) -----
      - name: Commit report to repository
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --local user.email "architecture-review[bot]@users.noreply.github.com"
          git config --local user.name "Architecture Review Bot"
          
          # Add the report
          git add reports/architecture-review-*.md
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$(cat <<'EOF'
          chore(review): architecture review report ${{ env.REVIEW_DATE }}

          Automated Architecture Review Board analysis.
          Status: ${{ steps.status.outputs.status_text }}

          Generated by: Architecture Review Engine
          EOF
          )"
            git push
          fi

      # ----- Post PR Comment (on pull requests) -----
      - name: Post review as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');
            
            // Find the report file
            const reports = fs.readdirSync('reports').filter(f => f.startsWith('architecture-review-'));
            if (reports.length === 0) {
              console.log('No report found');
              return;
            }
            
            const reportPath = `reports/${reports[reports.length - 1]}`;
            let reportContent = fs.readFileSync(reportPath, 'utf8');
            
            // Truncate if too long for PR comment (max ~65000 chars)
            if (reportContent.length > 60000) {
              reportContent = reportContent.substring(0, 60000) + '\n\n... (report truncated, see full report in artifacts)';
            }
            
            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('Architecture Review Report')
            );
            
            const commentBody = `${{ steps.status.outputs.status_emoji }} **Architecture Review: ${{ steps.status.outputs.status_text }}**\n\n${reportContent}`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

      # ----- Create/Update GitHub Issue for Critical Findings -----
      - name: Create issue for critical findings
        if: steps.status.outputs.status == 'critical' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Find the report
            const reports = fs.readdirSync('reports').filter(f => f.startsWith('architecture-review-'));
            const reportPath = `reports/${reports[reports.length - 1]}`;
            const reportContent = fs.readFileSync(reportPath, 'utf8');
            
            // Extract critical and high findings
            const lines = reportContent.split('\n');
            const criticalFindings = lines.filter(l => l.includes('🔴 CRITICAL') || l.includes('🟠 HIGH'));
            
            const issueTitle = `[ARB] Critical Architecture Issues - ${{ env.REVIEW_DATE }}`;
            
            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'architecture-review',
            });
            
            const existingIssue = issues.find(i => i.title.startsWith('[ARB]'));
            
            const issueBody = `## ${{ steps.status.outputs.status_emoji }} Architecture Review - Critical Findings
            
            **Date:** ${{ env.REVIEW_TIMESTAMP }}
            **Commit:** \`${context.sha.substring(0, 7)}\`
            **Branch:** \`${context.ref.replace('refs/heads/', '')}\`
            
            ### Critical & High Severity Findings
            
            | Severity | Architect | Finding | Detail | Location |
            |----------|-----------|---------|--------|----------|
            ${criticalFindings.join('\n')}
            
            ### Action Required
            
            The Architecture Review Board has identified critical issues that must be resolved before production deployment. Please review the full report in the \`reports/\` directory and follow the remediation plan.
            
            ---
            *This issue was automatically created by the Architecture Review Engine.*`;
            
            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: issueBody,
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create label if it doesn't exist
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'architecture-review',
                  color: 'D93F0B',
                  description: 'Issues identified by the Architecture Review Board',
                });
              } catch (e) {
                // Label already exists
              }
              
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['architecture-review'],
              });
              console.log(`Created new issue #${newIssue.number}`);
            }

      # ----- Summary -----
      - name: Write job summary
        if: always()
        run: |
          echo "## ${{ steps.status.outputs.status_emoji }} Architecture Review Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.status.outputs.status_text }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ env.REVIEW_TIMESTAMP }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "reports/architecture-review-${{ env.REVIEW_DATE }}.md" ]; then
            # Extract and display the executive summary
            sed -n '/## Executive Summary/,/^---$/p' "reports/architecture-review-${{ env.REVIEW_DATE }}.md" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📄 Full report available in the artifacts tab or \`reports/\` directory." >> $GITHUB_STEP_SUMMARY
          fi
